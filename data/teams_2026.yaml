# 48 seleções da Copa do Mundo 2026 — SORTEIO OFICIAL (5 dez 2025).
# Composição reconstruída dos confrontos reais no dataset martj42 e conferida
# com o sorteio oficial (todas as 12 letras batem).
# 'pt' = nome em português | 'ds' = nome exato no dataset | 'conf' = confederação
# host: true = país-sede (México A, Canadá B, EUA D).

hosts: [Mexico, Canada, United States]

groups:
  A:
    - {pt: "México",        ds: "Mexico",         conf: CONCACAF, host: true}
    - {pt: "Coreia do Sul", ds: "South Korea",    conf: AFC}
    - {pt: "África do Sul", ds: "South Africa",   conf: CAF}
    - {pt: "Tchéquia",      ds: "Czech Republic", conf: UEFA}
